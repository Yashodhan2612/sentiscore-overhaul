<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="SentiScore">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0C1526"/>
      <stop offset="100%" stop-color="#14213A"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="halo" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="h"/>
      <feMerge><feMergeNode in="h"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Badge background -->
  <rect x="1" y="1" width="46" height="46" rx="10" fill="url(#bg)"/>
  <rect x="1" y="1" width="46" height="46" rx="10" stroke="#1E3860" stroke-width="1"/>

  <!-- Guide lines -->
  <line x1="3" y1="35" x2="45" y2="35" stroke="#1A3050" stroke-width="0.6"/>
  <line x1="24" y1="3" x2="24" y2="45" stroke="#1A3050" stroke-width="0.6" stroke-dasharray="2.5 3.5"/>

  <!-- EKG signal -->
  <path d="M 4 35 L 15 35 L 18 28 L 24 10 L 30 35 L 44 35"
        stroke="#F59E0B" stroke-width="2.8"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Score peak target -->
  <circle cx="24" cy="10" r="9"   fill="#F59E0B" opacity="0.10" filter="url(#halo)"/>
  <circle cx="24" cy="10" r="5.5" fill="#0C1526"/>
  <circle cx="24" cy="10" r="5.5" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="24" cy="10" r="2.5" fill="#FCD34D"/>

  <!-- Measurement ticks -->
  <line x1="17" y1="33.5" x2="17" y2="36.5" stroke="#F59E0B" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
  <line x1="31" y1="33.5" x2="31" y2="36.5" stroke="#F59E0B" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
</svg>
